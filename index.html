<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شكونو هو؟ - الرئيسية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
            max-width: 500px;
            margin: 50px auto;
        }
        .menu-card {
            display: flex;
            align-items: center;
            padding: 20px;
            background: var(--surface-color);
            border-radius: var(--radius-lg);
            text-decoration: none;
            color: var(--text-main);
            transition: transform 0.2s;
            box-shadow: var(--shadow-soft);
        }
        .menu-card:hover {
            transform: translateY(-5px);
        }
        .menu-icon {
            font-size: 2.5rem;
            margin-left: 20px;
        }
        .menu-info {
            display: flex;
            flex-direction: column;
        }
        .menu-title {
            font-size: 1.4rem;
            font-weight: 800;
        }
        .menu-sub {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <main class="container">
        <header class="app-header" style="text-align: center; justify-content: center;">
            <h1 style="margin: 0;">🕵️‍♂️ شكونو هو؟</h1>
        </header>

        <div class="menu-container">
            <a href="games/impostor.html" class="menu-card">
                <span class="menu-icon">🕵️‍♂️</span>
                <div class="menu-info">
                    <span class="menu-title">شكونو هو؟</span>
                    <span class="menu-sub">كلمة، كذاب، وتصويت</span>
                </div>
            </a>
            <a href="games/thief.html" class="menu-card">
                <span class="menu-icon">🗝️</span>
                <div class="menu-info">
                    <span class="menu-title">سارق، حاكم، جلّاد</span>
                    <span class="menu-sub">الحاكم يفيق بالسارق</span>
                </div>
            </a>
            <a href="games/spyfall.html" class="menu-card">
                <span class="menu-icon">🕶️</span>
                <div class="menu-info">
                    <span class="menu-title">ماناش هوني</span>
                    <span class="menu-sub">بلاصة، أدوار، وspy مخبي</span>
                </div>
            </a>
            <a href="games/coup.html" class="menu-card">
                <span class="menu-icon">👑</span>
                <div class="menu-info">
                    <span class="menu-title">كول وبوّع</span>
                    <span class="menu-sub">فلوس، تبلعيط، و"تكذب!"</span>
                </div>
            </a>
            <a href="games/chkobba.html" class="menu-card">
                <span class="menu-icon">🃏</span>
                <div class="menu-info">
                    <span class="menu-title">شكبّة</span>
                    <span class="menu-sub">كوارط، حساب، و"شكبّة!"</span>
                </div>
            </a>
        </div>
    </main>
</body>
</html>
